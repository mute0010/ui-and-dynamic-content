<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI and Dynamic Content</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Widget container -->
     <div class="widget">
       <header>
        <img src="img/AdobeStock_97000552.jpeg" alt="shopping cart">
        <h1> BUY GROCERIES </h1>
        <p> What do you need to buy today?</p>
        </header>

    <!-- Main page content -->
     <section>
        <!-- text input -->
         <input type="text" id="itemInput" placeholder="enter item">

         <!-- add item button-->
          <button id="addButton">ADD ITEM</button>
          <!-- feedback message -->
           <p class="feedback"></p>

           <!-- a list with the items will appear -->
            <ul id="itemList"></ul>
     </section>

     <!-- footer with social media links -->
      <footer>
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>      
      </footer>

      </div>

      <!-- JAVASCRIPT FILE -->
       <script src="js/script.js"></script>
</body>
</html>
